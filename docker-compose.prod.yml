services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-checklist}
      POSTGRES_USER: ${DB_USER:-checklist}
      POSTGRES_PASSWORD: ${DB_PASS:-checklist_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-checklist}"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER:-checklist}:${DB_PASS:-checklist_secret}@db:5432/${DB_NAME:-checklist}
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-random-secret-string}
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
      SMTP_HOST: ${SMTP_HOST:-smtp.beget.com}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER:-support@checkonout.ru}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-"Чек-лист инженера <support@checkonout.ru>"}
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE: "10485760"
      MAX_ATTACHMENT_SIZE: "26214400"
      PORT: "3001"
      NODE_ENV: production
      CLIENT_URL: ${CLIENT_URL:-https://your-domain.com}
    volumes:
      - uploads:/app/uploads
      - reports:/app/reports
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - server

volumes:
  pgdata:
  uploads:
  reports:
